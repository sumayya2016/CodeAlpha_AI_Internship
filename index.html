<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Translation Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        h1 span { color: #667eea; }
        .lang-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        select {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            outline: none;
        }
        select:focus { border-color: #667eea; }
        .swap-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
        }
        .text-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .text-box {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        textarea:focus { border-color: #667eea; }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .translate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .translate-btn:hover { opacity: 0.9; }
        .translate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .copy-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .copy-btn:hover { background: #f0f0ff; }
        .error { color: red; text-align: center; margin-top: 10px; font-size: 14px; }
        .loading { text-align: center; color: #667eea; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Language <span>Translation</span> Tool</h1>

        <div class="lang-row">
            <select id="sourceLang">
                <option value="en">English</option>
                <option value="ur">Urdu</option>
                <option value="ar">Arabic</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="hi">Hindi</option>
                <option value="tr">Turkish</option>
                <option value="ru">Russian</option>
            </select>

            <button class="swap-btn" onclick="swapLanguages()">⇄</button>

            <select id="targetLang">
                <option value="ur">Urdu</option>
                <option value="en">English</option>
                <option value="ar">Arabic</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="es">Spanish</option>
                <option value="zh">Chinese</option>
                <option value="hi">Hindi</option>
                <option value="tr">Turkish</option>
                <option value="ru">Russian</option>
            </select>
        </div>

        <div class="text-row">
            <div class="text-box">
                <textarea id="inputText" placeholder="Enter text to translate..." oninput="updateCount()"></textarea>
                <div class="char-count"><span id="charCount">0</span> / 500</div>
            </div>
            <div class="text-box">
                <textarea id="outputText" placeholder="Translation will appear here..." readonly></textarea>
            </div>
        </div>

        <button class="translate-btn" onclick="translateText()" id="translateBtn">
            🔄 Translate
        </button>
        <button class="copy-btn" onclick="copyText()">
            📋 Copy Translation
        </button>

        <div id="message"></div>
    </div>

    <script>
        function updateCount() {
            const text = document.getElementById('inputText').value;
            document.getElementById('charCount').textContent = text.length;
        }

        function swapLanguages() {
            const src = document.getElementById('sourceLang');
            const tgt = document.getElementById('targetLang');
            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');

            const tempLang = src.value;
            src.value = tgt.value;
            tgt.value = tempLang;

            const tempText = inputText.value;
            inputText.value = outputText.value;
            outputText.value = tempText;
            updateCount();
        }

        async function translateText() {
            const text = document.getElementById('inputText').value.trim();
            const source = document.getElementById('sourceLang').value;
            const target = document.getElementById('targetLang').value;
            const btn = document.getElementById('translateBtn');
            const msg = document.getElementById('message');

            if (!text) {
                msg.innerHTML = '<p class="error">Please enter text to translate!</p>';
                return;
            }
            if (source === target) {
                msg.innerHTML = '<p class="error">Source and target languages are same!</p>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Translating...';
            msg.innerHTML = '<p class="loading">Please wait...</p>';

            try {
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === 200) {
                    document.getElementById('outputText').value = data.responseData.translatedText;
                    msg.innerHTML = '';
                } else {
                    msg.innerHTML = '<p class="error">Translation failed. Try again!</p>';
                }
            } catch (err) {
                msg.innerHTML = '<p class="error">Network error. Check internet connection!</p>';
            }

            btn.disabled = false;
            btn.textContent = '🔄 Translate';
        }

        function copyText() {
            const output = document.getElementById('outputText').value;
            if (!output) {
                document.getElementById('message').innerHTML = '<p class="error">Nothing to copy!</p>';
                return;
            }
            navigator.clipboard.writeText(output);
            document.getElementById('message').innerHTML = '<p style="color:green;text-align:center">✅ Copied!</p>';
        }
    </script>
</body>
</html>
