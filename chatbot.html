<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .header-info h2 { color: white; font-size: 20px; }
        .header-info p { color: rgba(255,255,255,0.8); font-size: 13px; }
        .status { width: 10px; height: 10px; background: #fff; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .message.user { flex-direction: row-reverse; }
        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }
        .bot .bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .user .bubble {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .bot .msg-avatar { background: #e8f5e9; }
        .user .msg-avatar { background: #e0f2f1; }
        .suggestions {
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
        .suggestion-btn {
            padding: 6px 14px;
            background: white;
            border: 2px solid #11998e;
            color: #11998e;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
        .suggestion-btn:hover { background: #11998e; color: white; }
        .input-area {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
            background: white;
        }
        input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #11998e; }
        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h2>FAQ Assistant</h2>
                <p><span class="status"></span>Online — Ask me anything!</p>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="msg-avatar">🤖</div>
                <div class="bubble">Hello! 👋 I'm your FAQ Assistant. Ask me anything or choose a topic below!</div>
            </div>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="askQuestion('What is AI?')">What is AI?</button>
            <button class="suggestion-btn" onclick="askQuestion('How does machine learning work?')">Machine Learning</button>
            <button class="suggestion-btn" onclick="askQuestion('What is Python?')">What is Python?</button>
            <button class="suggestion-btn" onclick="askQuestion('What is deep learning?')">Deep Learning</button>
            <button class="suggestion-btn" onclick="askQuestion('What is a neural network?')">Neural Networks</button>
            <button class="suggestion-btn" onclick="askQuestion('What is NLP?')">What is NLP?</button>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your question..." onkeypress="handleKey(event)"/>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const faqs = [
            {
                keywords: ['what is ai', 'artificial intelligence', 'define ai'],
                answer: '🤖 Artificial Intelligence (AI) is the simulation of human intelligence in machines. It enables computers to learn, reason, and solve problems like humans!'
            },
            {
                keywords: ['machine learning', 'ml', 'how does machine learning'],
                answer: '📊 Machine Learning is a subset of AI where computers learn from data without being explicitly programmed. It finds patterns and makes decisions automatically!'
            },
            {
                keywords: ['deep learning', 'deep neural'],
                answer: '🧠 Deep Learning uses neural networks with many layers to learn complex patterns. It powers things like image recognition and speech processing!'
            },
            {
                keywords: ['neural network', 'neural net'],
                answer: '🕸️ A Neural Network is a system inspired by the human brain. It consists of layers of connected nodes that process and learn from data!'
            },
            {
                keywords: ['nlp', 'natural language processing', 'what is nlp'],
                answer: '💬 Natural Language Processing (NLP) helps computers understand and generate human language. It powers chatbots, translation, and voice assistants!'
            },
            {
                keywords: ['what is python', 'python language', 'python programming'],
                answer: '🐍 Python is a popular, easy-to-learn programming language widely used in AI, data science, and web development!'
            },
            {
                keywords: ['what is data science', 'data science'],
                answer: '📈 Data Science combines statistics, programming, and domain knowledge to extract insights from data and make predictions!'
            },
            {
                keywords: ['what is chatbot', 'chatbot', 'how do chatbots work'],
                answer: '🤖 A Chatbot is an AI program that simulates conversation with users. It uses NLP to understand questions and provide relevant answers!'
            },
            {
                keywords: ['hello', 'hi', 'hey', 'salam', 'assalam'],
                answer: '👋 Hello! Great to meet you! I am your FAQ Assistant. Ask me any question about AI, ML, or technology!'
            },
            {
                keywords: ['thank', 'thanks', 'shukriya'],
                answer: '😊 You are welcome! Feel free to ask more questions anytime!'
            },
            {
                keywords: ['bye', 'goodbye', 'khuda hafiz'],
                answer: '👋 Goodbye! Have a great day! Come back anytime you have questions!'
            }
        ];

        function findAnswer(question) {
            const q = question.toLowerCase();
            for (const faq of faqs) {
                for (const keyword of faq.keywords) {
                    if (q.includes(keyword)) {
                        return faq.answer;
                    }
                }
            }
            return "🤔 I'm not sure about that. Try asking about AI, Machine Learning, Deep Learning, NLP, or Python!";
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="msg-avatar">${sender === 'bot' ? '🤖' : '👤'}</div>
                <div class="bubble">${text}</div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = '';
            setTimeout(() => {
                const answer = findAnswer(text);
                addMessage(answer, 'bot');
            }, 600);
        }

        function askQuestion(q) {
            addMessage(q, 'user');
            setTimeout(() => {
                const answer = findAnswer(q);
                addMessage(answer, 'bot');
            }, 600);
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
